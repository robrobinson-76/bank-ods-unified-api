scalar DateTime
scalar Decimal

type PageInfo {
  hasMore: Boolean!
  nextCursor: String
}

type ClientMaster {
  clientId: String!
  clientName: String!
  lei: String!
  countryOfDomicile: String!
  countryOfIncorporation: String!
  taxResidencies: [String!]!
  classification: String!
  kycStatus: String!
  riskRating: String!
  legalEntityType: String!
  parentClientId: String
}

type Listing {
  sedol: String!
  micCode: String!
  operatingMic: String!
  exchangeName: String
  tradedCurrency: String!
  countryOfListing: String!
  settlementLocation: String!
  localCode: String
  primaryListing: Boolean!
  status: String!
}

type StatusHistoryEntry {
  status: String!
  timestamp: DateTime!
}

type Account {
  accountId: String!
  accountName: String!
  accountType: String!
  client: ClientMaster!
  baseCurrency: String!
  status: String!
  openDate: DateTime!
  closeDate: DateTime
  custodianBranch: String!
  createdAt: DateTime!
  updatedAt: DateTime!
}

type AccountList {
  data: [Account!]!
  pageInfo: PageInfo!
}

type Security {
  securityId: String!
  isin: String
  cusip: String
  ticker: String
  figi: String
  description: String!
  assetClass: String!
  subType: String!
  currency: String!
  exchange: String
  issuer: String!
  country: String!
  maturityDate: DateTime
  couponRate: Decimal
  status: String!
  listings: [Listing!]!
  createdAt: DateTime!
  updatedAt: DateTime!
}

type SecurityList {
  data: [Security!]!
  pageInfo: PageInfo!
}

type Transaction {
  transactionId: String!
  transactionType: String!
  tradeDate: DateTime!
  settlementDate: DateTime!
  accountId: String!
  securityId: String
  quantity: Decimal
  price: Decimal
  currency: String!
  grossAmount: Decimal!
  fees: Decimal!
  netAmount: Decimal!
  fxRate: Decimal!
  counterpartyId: String!
  status: String!
  settlementRef: String
  sourceSystem: String!
  internalRef: String!
  createdAt: DateTime!
  updatedAt: DateTime!
}

type TransactionList {
  data: [Transaction!]!
  pageInfo: PageInfo!
}

type Position {
  positionId: String!
  accountId: String!
  securityId: String!
  asOfDate: DateTime!
  quantity: Decimal!
  currency: String!
  costBasis: Decimal!
  marketPrice: Decimal!
  marketValue: Decimal!
  unrealizedPnL: Decimal!
  positionType: String!
  snapshotType: String!
  createdAt: DateTime!
  updatedAt: DateTime!
}

type PositionList {
  data: [Position!]!
  pageInfo: PageInfo!
}

type Settlement {
  settlementId: String!
  transactionId: String!
  accountId: String!
  securityId: String
  settlementDate: DateTime!
  deliveryType: String!
  quantity: Decimal
  currency: String!
  settlementAmount: Decimal!
  counterpartyId: String!
  counterpartyAccount: String!
  custodianAccount: String!
  status: String!
  statusHistory: [StatusHistoryEntry!]!
  failReason: String
  csdRef: String
  swiftRef: String
  createdAt: DateTime!
  updatedAt: DateTime!
}

type SettlementList {
  data: [Settlement!]!
  pageInfo: PageInfo!
}

type CashBalance {
  balanceId: String!
  accountId: String!
  currency: String!
  asOfDate: DateTime!
  openingBalance: Decimal!
  credits: Decimal!
  debits: Decimal!
  closingBalance: Decimal!
  pendingCredits: Decimal!
  pendingDebits: Decimal!
  projectedBalance: Decimal!
  snapshotType: String!
  createdAt: DateTime!
  updatedAt: DateTime!
}

type CashBalanceList {
  data: [CashBalance!]!
  pageInfo: PageInfo!
}


type TransactionSummaryItem {
  transactionType: String!
  status: String!
  count: Int!
  totalNetAmount: Decimal!
}

type TransactionSummaryList {
  data: [TransactionSummaryItem!]!
}

type ProjectedBalance {
  accountId: String!
  currency: String!
  asOfDate: String!
  closingBalance: Decimal
  pendingCredits: Decimal
  pendingDebits: Decimal
  projectedBalance: Decimal
}


type Query {
  # Accounts
  get_account(accountId: String!): Account
  list_accounts(clientId: String, status: String, lei: String, domicile: String, limit: Int, cursor: String): AccountList!

  # Securities
  get_security(securityId: String!): Security
  get_security_by_sedol(sedol: String!): Security
  list_securities(assetClass: String, ticker: String, status: String, sedol: String, limit: Int, cursor: String): SecurityList!

  # Transactions
  get_transaction(transactionId: String!): Transaction
  get_transactions(accountId: String!, fromDate: String!, toDate: String!, status: String, transactionType: String, limit: Int, cursor: String): TransactionList!
  get_transaction_summary(accountId: String!, fromDate: String!, toDate: String!): TransactionSummaryList!

  # Positions
  get_position(accountId: String!, securityId: String!, asOfDate: String!): Position
  get_positions(accountId: String!, asOfDate: String!, limit: Int, cursor: String): PositionList!
  get_position_history(accountId: String!, securityId: String!, fromDate: String!, toDate: String!, limit: Int, cursor: String): PositionList!

  # Settlements
  get_settlement(settlementId: String!): Settlement
  get_settlement_status(transactionId: String!): Settlement
  get_settlements(accountId: String!, settlementDate: String!, status: String, limit: Int, cursor: String): SettlementList!
  get_settlement_fails(fromDate: String!, toDate: String!, accountId: String, limit: Int, cursor: String): SettlementList!

  # Balances
  get_cash_balance(accountId: String!, currency: String!, asOfDate: String!): CashBalance
  get_cash_balances(accountId: String!, asOfDate: String!, limit: Int, cursor: String): CashBalanceList!
  get_projected_balance(accountId: String!, currency: String!, asOfDate: String!): ProjectedBalance
}