services:
  mongodb:
    image: mongo:7.0
    container_name: bank-ods-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: bank_ods
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  rest:
    build:
      context: .
      dockerfile: Dockerfile.rest
    container_name: bank-ods-rest
    ports:
      - "8000:8000"
    environment:
      MONGODB_URI: mongodb://mongodb:27017
      MONGODB_DB: bank_ods
      LOG_LEVEL: INFO
      DEBUG: "false"
    depends_on:
      mongodb:
        condition: service_healthy

  graphql:
    build:
      context: .
      dockerfile: Dockerfile.graphql
    container_name: bank-ods-graphql
    ports:
      - "8001:8001"
    environment:
      MONGODB_URI: mongodb://mongodb:27017
      MONGODB_DB: bank_ods
      LOG_LEVEL: INFO
      DEBUG: "false"
    depends_on:
      mongodb:
        condition: service_healthy

  # Side-by-side Strawberry evaluation twin of the Ariadne graphql service.
  # Same contract, same queries — see docs/REVIEW-strawberry-graphql.md.
  graphql-strawberry:
    build:
      context: .
      dockerfile: Dockerfile.graphql
    container_name: bank-ods-graphql-strawberry
    command: ["uvicorn", "bank_ods.graphql_strawberry:app", "--host", "0.0.0.0", "--port", "8002"]
    ports:
      - "8002:8002"
    environment:
      MONGODB_URI: mongodb://mongodb:27017
      MONGODB_DB: bank_ods
      LOG_LEVEL: INFO
      DEBUG: "false"
    depends_on:
      mongodb:
        condition: service_healthy

  # Side-by-side Graphene evaluation twin — same contract, port 8003.
  graphql-graphene:
    build:
      context: .
      dockerfile: Dockerfile.graphql
    container_name: bank-ods-graphql-graphene
    command: ["uvicorn", "bank_ods.graphql_graphene:app", "--host", "0.0.0.0", "--port", "8003"]
    ports:
      - "8003:8003"
    environment:
      MONGODB_URI: mongodb://mongodb:27017
      MONGODB_DB: bank_ods
      LOG_LEVEL: INFO
      DEBUG: "false"
    depends_on:
      mongodb:
        condition: service_healthy

volumes:
  mongo_data:
